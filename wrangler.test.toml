# 测试专用 wrangler 配置（vitest 用）。
# 与生产 wrangler.toml 一致，但**去掉 [ai] 绑定**：Workers AI 需外部代理，
# 本地 Miniflare 测试运行时无法解析（__WRANGLER_EXTERNAL_AI_WORKER），会导致 runtime 启动失败。
# 语音相关测试用 mock env.AI（见 test/stt.test.ts），不需要真实 AI 绑定。
name = "moto-agent"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "moto-agent-db"
database_id = "aabb7693-c5bd-457f-9ad6-1e7af53c2450"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "2d40bc5b10a9453d80573163222b702e"
preview_id = "c7e3944db10449e79cc12040fd5781e3"
