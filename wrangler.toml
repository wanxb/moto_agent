name = "moto-agent"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "moto-agent-db"
database_id = "aabb7693-c5bd-457f-9ad6-1e7af53c2450"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "2d40bc5b10a9453d80573163222b702e"
preview_id = "c7e3944db10449e79cc12040fd5781e3"

# Cron Triggers（spec 003 定时提醒）：每日 01:00 UTC 扫描到期提醒
[triggers]
crons = ["0 1 * * *"]

# Vectorize 向量索引（spec 015 知识库 RAG）
[[vectorize]]
binding = "KNOWLEDGE_INDEX"
index_name = "knowledge_index"

# Workers AI 绑定（spec 008 语音转文字 Whisper）
[ai]
binding = "AI"

# 静态资源 / PWA 前端（spec 016 / ADR-0010）：web/ 的 Vite 构建产物。
# 部署前需先 `npm --prefix web run build` 产出 web/dist（已 gitignore）。
# Worker 优先处理动态路由（/api、/auth、webhook），其余 GET 经 env.ASSETS 回退到 SPA。
[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# 非密钥环境变量（spec 016 多用户发信）
[vars]
SENDER_EMAIL = "noreply@bbing.xyz"
WORKER_ORIGIN = "https://moto.bbing.xyz"

# Secrets are set via: wrangler secret put SECRET_NAME
# Required secrets:
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_WEBHOOK_SECRET
#   DEEPSEEK_API_KEY
#   ANTHROPIC_API_KEY
#   ALLOWED_CHAT_ID
#   DASHBOARD_URL
#   RESEND_API_KEY
